substitutions:
  # Update these to match your Home Assistant entity IDs
  light_entity: light.your_wled_light
  preset_entity: select.your_wled_preset_selector

esphome:
  name: esp32-led-controller
  friendly_name: ESP32 Led Controller
  on_boot:
    priority: -100  # run after all components are ready
    then:
      - output.turn_on: lcd_backlight
      - globals.set:
          id: lcd_on
          value: 'true'
      - component.update: main_lcd

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - script.execute: lcd_wake  # start normal 10s timeout once HA connects
  on_client_disconnected:
    - script.stop: lcd_wake
    - output.turn_on: lcd_backlight
    - globals.set:
        id: lcd_on
        value: 'true'
    - component.update: main_lcd

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp32-WLED-Controller"
    password: !secret ap_password

captive_portal:

# Backlight transistor control – GPIO17 drives the base via 1kΩ resistor
output:
  - platform: gpio
    pin: GPIO17
    id: lcd_backlight

# Global state variables
globals:
  - id: lcd_on          # true while LCD is showing content
    type: bool
    initial_value: 'false'
  - id: joy_x_dir       # last X-axis direction (-1/0/1); prevents repeat on spring-back
    type: int
    initial_value: '0'
  - id: joy_nav_locked  # true during 350ms cooldown after a menu move
    type: bool
    initial_value: 'false'
  - id: menu_pos        # tracks current selection index for wrap-around
    type: int
    initial_value: '0'
  - id: preset_count    # total number of items in preset_menu
    type: int
    initial_value: '8'

binary_sensor:
  # Rotary encoder push-button (GPIO32) – toggles WLED on/off
  - platform: gpio
    name: "WLED Power Button"
    pin:
      number: GPIO32
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      - script.execute: lcd_wake
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: ${light_entity}

  # WLED on/off state mirrored from Home Assistant
  - platform: homeassistant
    id: ha_light_state
    entity_id: ${light_entity}

  # Joystick push-button (GPIO25) – opens menu or confirms selected preset
  - platform: gpio
    name: "Joystick Button"
    pin:
      number: GPIO25
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      - if:
          condition:
            display_menu.is_active: preset_menu
          then:
            - display_menu.enter: preset_menu
          else:
            - display_menu.show: preset_menu
            - globals.set:
                id: menu_pos
                value: '0'
      - script.execute: lcd_wake

script:
  # Turns LCD on and (re)starts the 10s inactivity timer; hides menu on timeout
  - id: lcd_wake
    mode: restart
    then:
      - output.turn_on: lcd_backlight
      - globals.set:
          id: lcd_on
          value: 'true'
      - component.update: main_lcd
      - delay: 10s
      - display_menu.hide: preset_menu
      - globals.set:
          id: lcd_on
          value: 'false'
      - component.update: main_lcd
      - output.turn_off: lcd_backlight

  # Releases the navigation lock after 350ms (allows next joystick move)
  - id: joy_unlock
    then:
      - delay: 350ms
      - globals.set:
          id: joy_nav_locked
          value: 'false'

# 16x2 LCD (GPIO21/19/18/4 data, GPIO22 enable, GPIO23 RS)
# Shows preset menu when active; otherwise shows current preset + on/off + brightness
display:
  - platform: lcd_gpio
    id: main_lcd
    dimensions: 16x2
    data_pins:
      - GPIO21
      - GPIO19
      - GPIO18
      - GPIO4
    enable_pin: GPIO22
    rs_pin: GPIO23
    update_interval: 1s
    lambda: |-
      if (!global_api_server->is_connected()) {
        it.print(0, 0, "No HA connection ");
        it.print(0, 1, "Connecting...   ");
        return;
      }
      if (id(preset_menu).is_active()) {
        id(preset_menu).draw();
        return;
      }
      if (!id(lcd_on)) {
        it.print(0, 0, "                ");
        it.print(0, 1, "                ");
        return;
      }
      it.printf(0, 0, "%-16.16s",
        id(ha_wled_preset).has_state()
          ? id(ha_wled_preset).state.c_str() : "No preset");
      if (id(ha_light_state).state) {
        int bri = id(ha_wled_brightness_raw).has_state()
                  ? (int)roundf(id(ha_wled_brightness_raw).state / 255.0 * 100) : 0;
        it.printf(0, 1, "ON   Bright:%3d%%", bri);
      } else {
        it.print(0, 1, "OFF             ");
      }

# Preset menu – joystick mode, hidden by default; shown on joystick button press
lcd_menu:
  id: preset_menu
  display_id: main_lcd
  active: false
  mode: joystick
  items:
    - type: command
      text: "Candle Multi"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Candle Multi"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Colorwaves"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Colorwaves"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Fireworks"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Fireworks"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Gradient"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Gradient"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Lake"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Lake"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Noise 3"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Noise 3"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Random Colors"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Random Colors"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake
    - type: command
      text: "Solid"
      on_value:
        - homeassistant.action:
            action: select.select_option
            data:
              entity_id: ${preset_entity}
              option: "Solid"
        - display_menu.hide: preset_menu
        - script.execute: lcd_wake

# WLED preset name – synced from Home Assistant select entity
text_sensor:
  - platform: homeassistant
    id: ha_wled_preset
    entity_id: ${preset_entity}

sensor:
  # WLED brightness attribute (0–255) from Home Assistant
  - platform: homeassistant
    id: ha_wled_brightness_raw
    entity_id: ${light_entity}
    attribute: brightness

  # Rotary encoder (GPIO34/35) – controls WLED brightness 0–100% mapped to 0–255
  - platform: rotary_encoder
    id: brightness_encoder
    name: "Brightness Encoder"
    pin_a: GPIO34
    pin_b: GPIO35
    min_value: 0
    max_value: 100
    resolution: 4
    filters:
      - debounce: 50ms
    on_value:
      - script.execute: lcd_wake
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: ${light_entity}
            brightness: !lambda "return (int)(x / 100.0 * 255);"

  # Joystick Y axis (GPIO36) – scrolls menu up/down with wrap-around
  # 350ms lock after each move prevents spring-back from triggering a reverse scroll
  - platform: adc
    pin: GPIO36
    id: joystick_y
    attenuation: 12db
    update_interval: 100ms
    on_value:
      - lambda: |-
          if (!id(preset_menu).is_active() || id(joy_nav_locked)) return;
          int last = id(preset_count) - 1;
          if (x < 1.0f) {
            if (id(menu_pos) == 0) {  // wrap: jump to last item
              for (int i = 0; i < last; i++) id(preset_menu).down();
              id(menu_pos) = last;
            } else {
              id(preset_menu).up();
              id(menu_pos)--;
            }
            id(main_lcd).update();
            id(joy_nav_locked) = true;
            id(joy_unlock).execute();
            id(lcd_wake).execute();
          } else if (x > 2.8f) {
            if (id(menu_pos) == last) {  // wrap: jump to first item
              for (int i = 0; i < last; i++) id(preset_menu).up();
              id(menu_pos) = 0;
            } else {
              id(preset_menu).down();
              id(menu_pos)++;
            }
            id(main_lcd).update();
            id(joy_nav_locked) = true;
            id(joy_unlock).execute();
            id(lcd_wake).execute();
          }

  # Joystick X axis (GPIO39) – tilt to close the menu
  - platform: adc
    pin: GPIO39
    id: joystick_x
    attenuation: 12db
    update_interval: 100ms
    on_value:
      - lambda: |-
          int new_dir = 0;
          if (x < 1.0f) new_dir = -1;
          else if (x > 2.3f) new_dir = 1;
          if (new_dir != 0 && id(joy_x_dir) == 0 && id(preset_menu).is_active()) {
            id(preset_menu).left();
            id(main_lcd).update();
          }
          id(joy_x_dir) = new_dir;
